<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hang Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#dbd8c5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div id="app">
        <!-- Timer View -->
        <div id="timer-view" class="view active">
            <header class="header">
                <h1 class="app-title">Hang Timer</h1>
                <button id="btn-edit" class="icon-btn" aria-label="Edit routine">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </button>
            </header>

            <div class="timer-display">
                <div class="progress-bar-track">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                    <div class="progress-bar-inner">
                        <span id="countdown" class="countdown">0</span>
                    </div>
                </div>
                <div id="phase-label" class="phase-label">READY</div>
            </div>

            <div id="timer-list" class="timer-list"></div>

            <div class="controls-bar">
                <div class="controls-side controls-left">
                    <button id="btn-reset" class="control-btn" aria-label="Reset">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                        </svg>
                    </button>
                </div>
                <button id="btn-play" class="control-btn primary" aria-label="Play">
                    <svg id="play-icon" width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                </button>
                <div class="controls-side controls-info">
                    <div id="time-left" class="controls-time"></div>
                    <div id="time-done" class="controls-time"></div>
                </div>
            </div>
        </div>

        <!-- Edit View -->
        <div id="edit-view" class="view">
            <header class="header">
                <button id="btn-back" class="icon-btn" aria-label="Back">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>
                <h1 class="app-title">Edit Routine</h1>
                <button id="btn-add" class="icon-btn" aria-label="Add timer">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </header>

            <details class="info-panel" open>
                <summary>About this routine</summary>
                <p>
                    Based on Dave MacLeod's
                    <a href="https://youtu.be/PebF3NyEGPc?si=bg1f0wf3lGNIgEm6" target="_blank" rel="noopener">hangboard routine</a>.
                    8 warm-up sets followed by 9 &ldquo;max hang&rdquo; sets.
                </p>
                <div class="grip-images">
                    <figure class="grip-card">
                        <img src="grips/crimp.jpg" alt="Half Crimp" loading="lazy">
                        <figcaption>Half Crimp</figcaption>
                    </figure>
                    <figure class="grip-card">
                        <img src="grips/chisel.jpg" alt="Chisel" loading="lazy">
                        <figcaption>Chisel</figcaption>
                    </figure>
                    <figure class="grip-card">
                        <img src="grips/drag.jpg" alt="Drag" loading="lazy">
                        <figcaption>Drag</figcaption>
                    </figure>
                </div>
            </details>

            <div class="edit-list-header">
                <div class="elh-drag"></div>
                <div class="elh-check">
                    <input type="checkbox" id="select-all">
                </div>
                <div class="elh-label">Label</div>
                <div class="elh-time">Rest</div>
                <div class="elh-time">Hang</div>
                <span id="selected-count" class="selected-count"></span>
            </div>

            <div id="edit-list" class="edit-list"></div>

            <!-- Group action bar -->
            <div id="group-bar" class="group-bar hidden">
                <span id="group-info" class="group-info">0 selected</span>
                <button id="btn-group-edit" class="btn btn-primary">Edit</button>
                <button id="btn-delete-selected" class="btn btn-danger">Remove</button>
            </div>

            <!-- Group edit bottom sheet -->
            <div id="group-modal" class="modal hidden">
                <div class="modal-backdrop"></div>
                <div class="modal-sheet">
                    <h2>Edit Selected Timers</h2>
                    <div class="form-row">
                        <label for="group-label">Label</label>
                        <input type="text" id="group-label" placeholder="Leave blank to keep">
                    </div>
                    <div class="form-row">
                        <label for="group-rest">Rest (seconds)</label>
                        <input type="number" id="group-rest" min="1" value="10">
                    </div>
                    <div class="form-row">
                        <label for="group-hang">Hang (seconds)</label>
                        <input type="number" id="group-hang" min="1" value="10">
                    </div>
                    <div class="modal-actions">
                        <button id="btn-modal-cancel" class="btn btn-secondary">Cancel</button>
                        <button id="btn-modal-apply" class="btn btn-primary">Apply</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
