<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hang Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#dbd8c5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div id="app">
        <!-- Timer View -->
        <div id="timer-view" class="view active">
            <div class="timer-display">
                <div class="progress-bar-track">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                    <div class="progress-bar-inner">
                        <span id="countdown" class="countdown">0</span>
                    </div>
                </div>
                <div id="phase-label" class="phase-label">READY</div>
            </div>

            <div id="timer-list" class="timer-list"></div>

            <div class="controls-bar">
                <div class="controls-side controls-left">
                    <button id="btn-reset" class="control-btn" aria-label="Reset">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                        </svg>
                    </button>
                </div>
                <button id="btn-play" class="control-btn primary" aria-label="Play">
                    <svg id="play-icon" width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                </button>
                <div class="controls-side controls-info">
                    <div id="time-left" class="controls-time"></div>
                    <div id="time-done" class="controls-time"></div>
                </div>
            </div>

            <div class="bottom-bar">
                <button id="btn-settings" class="icon-btn btn-bottom-action" aria-label="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
                <button id="protocol-picker" class="protocol-picker" aria-label="Choose routine">
                    <span id="protocol-name" class="protocol-name">Hang Timer</span>
                    <svg class="protocol-picker-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </button>
                <button id="btn-edit" class="icon-btn btn-bottom-action" aria-label="Edit routine">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Edit View -->
        <div id="edit-view" class="view">
            <header class="header">
                <button id="btn-back" class="icon-btn" aria-label="Back">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>
                <div class="header-actions">
                    <button id="btn-delete-routine" class="btn btn-delete-routine" aria-label="Delete routine">Delete</button>
                    <button id="btn-share" class="btn btn-share" aria-label="Share routine">Share</button>
                </div>
            </header>

            <div class="edit-protocol-header">
                <input type="text" id="edit-title" class="edit-title-input" placeholder="Routine name">
            </div>

            <details class="info-panel" id="description-panel" open>
                <summary>About this routine</summary>
                <div id="protocol-description" class="protocol-description"></div>
            </details>

            <div class="edit-list-header">
                <div class="elh-drag"></div>
                <div class="elh-check">
                    <input type="checkbox" id="select-all">
                </div>
                <div class="elh-label">Label</div>
                <div class="elh-time">Rest</div>
                <div class="elh-time">Hang</div>
                <span id="selected-count" class="selected-count"></span>
            </div>

            <div id="edit-list" class="edit-list"></div>

            <!-- Group action bar -->
            <div id="group-bar" class="group-bar hidden">
                <span id="group-info" class="group-info">0 selected</span>
                <button id="btn-group-edit" class="btn btn-primary">Edit</button>
                <button id="btn-delete-selected" class="btn btn-danger">Remove</button>
            </div>

            <!-- Group edit bottom sheet -->
            <div id="group-modal" class="modal hidden">
                <div class="modal-backdrop"></div>
                <div class="modal-sheet">
                    <h2>Edit Selected Timers</h2>
                    <div class="form-row">
                        <label for="group-label">Label</label>
                        <input type="text" id="group-label" placeholder="Leave blank to keep">
                    </div>
                    <div class="form-row">
                        <label for="group-rest">Rest (seconds)</label>
                        <input type="number" id="group-rest" min="1" value="10">
                    </div>
                    <div class="form-row">
                        <label for="group-hang">Hang (seconds)</label>
                        <input type="number" id="group-hang" min="1" value="10">
                    </div>
                    <div class="modal-actions">
                        <button id="btn-modal-cancel" class="btn btn-secondary">Cancel</button>
                        <button id="btn-modal-apply" class="btn btn-primary">Apply</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings View -->
        <div id="settings-view" class="view">
            <header class="header">
                <button id="btn-settings-back" class="icon-btn" aria-label="Back">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>
                <h1 class="app-title">Settings</h1>
                <div style="width:44px"></div>
            </header>

            <div class="settings-content">
                <div class="settings-section">
                    <h2 class="settings-section-title">Timer</h2>
                    <div class="settings-row">
                        <div class="settings-row-info">
                            <div class="settings-label">Vibration</div>
                            <div class="settings-desc">Vibrate on phase changes</div>
                        </div>
                        <label class="toggle">
                            <input type="checkbox" id="setting-vibration" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-row">
                        <div class="settings-row-info">
                            <div class="settings-label">Countdown beeps</div>
                            <div class="settings-desc">Beeps before hang starts</div>
                        </div>
                        <div class="spinbox">
                            <button class="spinbox-btn" id="beep-decrement" aria-label="Decrease">−</button>
                            <span class="spinbox-value" id="setting-beep-count">3</span>
                            <button class="spinbox-btn" id="beep-increment" aria-label="Increase">+</button>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h2 class="settings-section-title">Source Code</h2>
                    <div class="settings-row">
                        <a href="https://github.com/alustig3/hangboard" target="_blank" rel="noopener" class="settings-link">github.com/alustig3/hangboard</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Protocol Picker Modal -->
        <div id="protocol-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-sheet">
                <h2>Routines</h2>
                <div id="protocol-list-items" class="protocol-list-items"></div>
                <button id="btn-new-protocol" class="btn btn-secondary btn-full">+ New Routine</button>
            </div>
        </div>

        <!-- Import Confirmation Modal -->
        <div id="import-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-sheet">
                <h2>Import Routine</h2>
                <div class="import-preview">
                    <div class="import-preview-title" id="import-title"></div>
                    <div class="import-preview-meta" id="import-step-count"></div>
                    <div class="import-preview-desc" id="import-description"></div>
                </div>
                <div class="modal-actions">
                    <button id="btn-import-decline" class="btn btn-secondary">Cancel</button>
                    <button id="btn-import-accept" class="btn btn-primary">Import</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
